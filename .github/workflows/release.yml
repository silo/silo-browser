name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build and publish
        timeout-minutes: 60
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm build && pnpm exec electron-builder --publish always

  release-macos:
    needs: release
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Import macOS signing certificate
        env:
          P12_BASE64: ${{ secrets.MAC_CERTIFICATE_P12 }}
          P12_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$HOME/Library/Keychains/build.keychain-db"
          echo "$P12_BASE64" | base64 --decode > /tmp/certificate.p12
          security create-keychain -p "actions" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security unlock-keychain -p "actions" "$KEYCHAIN_PATH"
          security set-keychain-settings -t 3600 -u "$KEYCHAIN_PATH"
          security import /tmp/certificate.p12 -k "$KEYCHAIN_PATH" -P "$P12_PASSWORD" -A -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "actions" "$KEYCHAIN_PATH"
          security show-keychain-info "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
          security find-certificate -a -c "Developer ID Application" -Z "$KEYCHAIN_PATH"
          rm /tmp/certificate.p12

      - name: Resolve signing identity
        run: |
          KEYCHAIN_PATH="$HOME/Library/Keychains/build.keychain-db"
          IDENTITY_HASH=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | awk '/Developer ID Application/{print $2; exit}')
          if [ -z "$IDENTITY_HASH" ]; then
            echo "No Developer ID Application identity found in CI keychain"
            exit 1
          fi
          echo "Using signing identity hash: $IDENTITY_HASH"
          echo "CSC_NAME=$IDENTITY_HASH" >> "$GITHUB_ENV"

      - name: Build app
        run: pnpm build

      - name: Package and sign (mac, no notarization)
        timeout-minutes: 120
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEBUG: electron-builder,electron-osx-sign*,@electron/notarize*,electron-publish*
          ELECTRON_BUILDER_LOG_LEVEL: debug
        run: pnpm exec electron-builder --mac --arm64 --publish never -c.mac.notarize=false

      - name: Resolve notarization auth mode
        id: resolve_notary_auth
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_PRIVATE_KEY_BASE64: ${{ secrets.APPLE_API_PRIVATE_KEY_BASE64 }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "$APPLE_API_KEY_ID" ] && [ -n "$APPLE_API_ISSUER_ID" ] && [ -n "$APPLE_API_PRIVATE_KEY_BASE64" ]; then
            echo "mode=api-key" >> "$GITHUB_OUTPUT"
            echo "Using App Store Connect API key for notarization"
          elif [ -n "$APPLE_ID" ] && [ -n "$APPLE_APP_SPECIFIC_PASSWORD" ] && [ -n "$APPLE_TEAM_ID" ]; then
            echo "mode=apple-id" >> "$GITHUB_OUTPUT"
            echo "Using Apple ID + app-specific password for notarization"
          else
            echo "No valid notarization credentials found."
            echo "Set either API-key secrets (APPLE_API_KEY_ID, APPLE_API_ISSUER_ID, APPLE_API_PRIVATE_KEY_BASE64)"
            echo "or Apple ID secrets (APPLE_ID, APPLE_ID_PASSWORD, APPLE_TEAM_ID)."
            exit 1
          fi

      - name: Prepare notarytool API key
        if: steps.resolve_notary_auth.outputs.mode == 'api-key'
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_PRIVATE_KEY_BASE64: ${{ secrets.APPLE_API_PRIVATE_KEY_BASE64 }}
        run: |
          KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          echo "$APPLE_API_PRIVATE_KEY_BASE64" | base64 --decode > "$KEY_PATH"
          chmod 600 "$KEY_PATH"
          echo "APPLE_API_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"

      - name: Notarize mac zip with notarytool
        timeout-minutes: 90
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          NOTARY_AUTH_MODE: ${{ steps.resolve_notary_auth.outputs.mode }}
        run: |
          ZIP_PATH=$(find dist -maxdepth 1 -type f -name "*-arm64-mac.zip" | head -n 1)
          if [ -z "$ZIP_PATH" ]; then
            echo "Could not find mac zip artifact in dist/"
            ls -la dist
            exit 1
          fi
          echo "Submitting $ZIP_PATH for notarization"
          if [ "$NOTARY_AUTH_MODE" = "api-key" ]; then
            xcrun notarytool submit "$ZIP_PATH" \
              --key "$APPLE_API_KEY_PATH" \
              --key-id "$APPLE_API_KEY_ID" \
              --issuer "$APPLE_API_ISSUER_ID" \
              --wait --timeout 60m
          else
            xcrun notarytool submit "$ZIP_PATH" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_APP_SPECIFIC_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait --timeout 60m
          fi

      - name: Staple and verify signed app
        run: |
          APP_PATH="dist/mac-arm64/Silo.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "Expected app not found at $APP_PATH"
            exit 1
          fi
          xcrun stapler staple "$APP_PATH"
          xcrun stapler validate "$APP_PATH"

          codesign --verify --deep --strict --verbose=4 "$APP_PATH"
          spctl -a -vvv "$APP_PATH"

          DMG_PATH=$(find dist -maxdepth 1 -type f -name "*.dmg" | head -n 1)
          if [ -n "$DMG_PATH" ]; then
            xcrun stapler staple "$DMG_PATH"
            xcrun stapler validate "$DMG_PATH"
          fi

      - name: Upload mac artifacts to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.dmg
            dist/*-arm64-mac.zip
            dist/*-arm64-mac.zip.blockmap
            dist/latest-mac.yml
